# 四条全局预设路径配置。
# 使用方法：
# 1. 在 RViz 中用 2D Pose Estimate 或 2D Goal 点选一个位姿；
# 2. 在终端执行：
#    ros2 topic echo /initialpose --once
#    或：
#    ros2 topic echo /goal_pose --once
# 3. 把输出里的 pose.position.x/y 和 pose.orientation.x/y/z/w 填到这里。
#
# 也可以不用 quaternion，改写为 yaw_deg: 90.0 这类角度制方向。
