slam_toolbox:
  ros__parameters:
    # 实车首版建图参数。
    # 目标是先保证 /map 稳定产出，再在此基础上逐步细调精度和实时性。

    # ---------------------------
    # 后端优化器 / Ceres 求解配置
    # ---------------------------
    # 后端图优化插件。常用为 CeresSolver，稳定且参数资料较多。
    solver_plugin: solver_plugins::CeresSolver
    # Ceres 线性求解器类型。
    # SPARSE_NORMAL_CHOLESKY 适合稀疏问题，常用于 2D SLAM 图优化。
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    # Ceres 预条件器。
    # SCHUR_JACOBI 一般作为默认稳妥配置即可。
    ceres_preconditioner: SCHUR_JACOBI
    # 非线性优化策略。
    # LEVENBERG_MARQUARDT 在收敛稳定性和速度之间较平衡。
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    # Dogleg 类型；只有部分 trust strategy 场景会真正使用到。
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    # 鲁棒损失函数。None 表示不过滤异常约束；若环境中误匹配较多，可再考虑改为 Huber 等。
    ceres_loss_function: None

    # ---------------------------
    # 坐标系 / 输入话题 / 运行模式
    # ---------------------------
    # 里程计坐标系。通常由底盘/融合定位模块提供。
    odom_frame: odom_combined
    # 地图坐标系。slam_toolbox 会发布 map -> odom 的变换。
    map_frame: map
    # 机器人本体坐标系，应与 TF 树中的车体基坐标一致。
    base_frame: base_footprint
    # 激光扫描话题。
    scan_topic: /scan
    # 运行模式：mapping 表示在线建图；若做纯定位通常会使用 localization。
    mode: mapping

    # ---------------------------
    # 基础运行参数
    # ---------------------------
    # 是否开启调试日志。排障时可开，正常运行建议关闭以减少日志量。
    debug_logging: false
    # 扫描降采样倍率。1 表示每帧都处理；2 表示每 2 帧取 1 帧。
    # 值越大，CPU 更省，但建图连续性和精度可能下降。
    throttle_scans: 2
    # 发布 map -> odom TF 的周期，单位秒。
    # 值越小，TF 更新越及时，但系统负担略增。
    transform_publish_period: 0.06
    # 地图栅格更新周期，单位秒。
    # 值越小，地图刷新更及时；值越大，CPU/内存压力更小。
    map_update_interval: 2.5
    # 地图分辨率，单位米/栅格。
    # 0.03 表示每个像素约 3cm。更小更精细，但地图更大、计算更重。
    resolution: 0.04
    # 激光最大有效量程，单位米。
    # 超过该距离的点通常不用于建图，可用于滤除远距离低置信度数据。
    max_laser_range: 8.0
    # 激光最小有效量程，单位米。
    # 用于滤除贴近雷达的噪声、车体反射或无效近距离回波。
    min_laser_range: 0.25
    # 两次处理扫描之间的最小时间间隔，单位秒。
    # 与 throttle_scans 配合控制处理频率，避免高频雷达压垮 CPU。
    minimum_time_interval: 0.15
    # 等待 TF 变换可用的超时时间，单位秒。
    # 若 TF 偶发延迟，可适当增大；过大则可能掩盖时序问题。
    transform_timeout: 0.6
    # TF 缓冲区时长，单位秒。
    # 机器人运动较快或链路延迟较大时，可适当增大。
    tf_buffer_duration: 30.0
    # 为线程栈预留的大小，单位字节。
    # 用于避免某些平台/复杂优化场景下栈空间不足。
    stack_size_to_use: 40000000
    # 是否启用交互模式。
    # true 时可配合 RViz 做手动标注/交互；实车自动建图通常关闭。
    enable_interactive_mode: false

    # ---------------------------
    # 前端扫描匹配 / 关键帧触发
    # ---------------------------
    # 是否启用扫描匹配。true 是常规 SLAM 的核心配置。
    use_scan_matching: true
    # 是否使用扫描点重心辅助配准。
    # 对某些规则环境有帮助，但在噪声较大时也可能引入轻微偏差。
    use_scan_barycenter: true
    # 触发一次新约束/关键帧更新所需的最小平移距离，单位米。
    # 值小：地图更细、更新更频繁；值大：计算更省但细节可能变差。
    minimum_travel_distance: 0.05
    # 触发一次新约束/关键帧更新所需的最小转角，单位弧度。
    # 0.05 rad 约等于 2.9 度。
    minimum_travel_heading: 0.45
    # 待处理扫描队列长度。
    # 运动快、雷达频率高时可适当增大；过大可能带来更高延迟。
    scan_queue_size: 20
    # 用于匹配的历史扫描缓冲区大小。
    # 越大可利用更多历史信息，但内存与计算量也会上升。
    scan_buffer_size: 15
    # 历史扫描纳入缓冲的最大距离，单位米。
    # 超过这个空间范围的旧扫描对当前局部匹配帮助通常较小。
    scan_buffer_maximum_scan_distance: 8.0
    # 精匹配阶段最小响应值。
    # 值越高越严格，可减少误连接；过高可能导致可用约束不足。
    link_match_minimum_response_fine: 0.12
    # 建立扫描间链接允许的最大距离，单位米。
    # 过大可能引入错误关联，过小则可能错过应有约束。
    link_scan_maximum_distance: 6.0

    # ---------------------------
    # 回环检测
    # ---------------------------
    # 是否启用回环闭合。
    # 当前关闭，更适合先追求稳定出图；后续地图大了再视情况开启。
    do_loop_closing: false
    # 搜索回环候选的最大距离，单位米。
    loop_search_maximum_distance: 3.0
    # 形成有效回环链所需的最小节点数。
    # 值越大越保守，误闭环风险更低，但也更难触发回环。
    loop_match_minimum_chain_size: 10
    # 粗匹配允许的最大方差。
    # 越小越严格，越大越宽松。
    loop_match_maximum_variance_coarse: 3.0
    # 回环粗匹配最小响应值。
    loop_match_minimum_response_coarse: 0.35
    # 回环精匹配最小响应值。
    loop_match_minimum_response_fine: 0.45
    # 回环搜索窗口边长，单位米。
    # 搜索空间越大，越容易找到回环，但计算量也越大。
    loop_search_space_dimension: 8.0
    # 回环搜索栅格分辨率，单位米。
    # 值越小搜索越精细，但耗时更高。
    loop_search_space_resolution: 0.05
    # 回环搜索时的“涂抹/平滑”标准差，单位米。
    # 适当增大可提高对轻微误差的容忍度。
    loop_search_space_smear_deviation: 0.04

    # ---------------------------
    # 局部相关性搜索窗口
    # ---------------------------
    # 局部匹配搜索窗口边长，单位米。
    # 机器人定位误差较大时可适当增大，但会增加匹配耗时。
    correlation_search_space_dimension: 0.6
    # 局部相关性搜索分辨率，单位米。
    correlation_search_space_resolution: 0.02
    # 相关性搜索平滑参数，单位米。
    # 可理解为对搜索响应做一定模糊化，增强鲁棒性。
    correlation_search_space_smear_deviation: 0.1

    # ---------------------------
    # 匹配代价函数权重
    # ---------------------------
    # 平移变化惩罚权重。
    # 越大越倾向于“少移动”的解，过大可能压制真实位移。
    distance_variance_penalty: 0.4
    # 角度变化惩罚权重。
    # 越大越抑制大角度旋转解。
    angle_variance_penalty: 1.0
    # 精搜索角度窗口，单位弧度。
    # 0.00349 rad 约等于 0.2 度。
    fine_search_angle_offset: 0.00349
    # 粗搜索角度窗口，单位弧度。
    # 0.349 rad 约等于 20 度。
    coarse_search_angle_offset: 0.349
    # 粗搜索角度分辨率，单位弧度。
    # 0.0349 rad 约等于 2 度。
    coarse_angle_resolution: 0.0349
    # 最小角度惩罚下限。
    # 用于避免角度代价过低导致匹配过于激进。
    minimum_angle_penalty: 0.8
    # 最小距离惩罚下限。
    minimum_distance_penalty: 0.5
    # 是否对响应搜索结果做扩展。
    # 一般开启有助于提升匹配鲁棒性。
    use_response_expansion: true
